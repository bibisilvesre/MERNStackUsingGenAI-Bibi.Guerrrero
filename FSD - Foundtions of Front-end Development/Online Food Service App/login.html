<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css"> 
    <script src="https://cdn.tailwindcss.com"></script>  
 </head>     
<body class="bg-pink-900 flex items-center justify-center min-h-screen">
    <form action="dashboard.html" onsubmit="return checkInfo()" method="post"
       class="bg-pink-200 shadow-md rounded px-8 pt-6 pb-8 mb-4 w-full max-w-sm">
     <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>
     <input type="email" placeholder="Enter your email" id="emailId" required
         class="mb-4 px-3 py-2 border rounded w-full focus:outline-none focus:ring-2 focus:ring-blue-400"/><br/>
     <input type="password" placeholder="Enter your password" id="password" required
         class="mb-4 px-3 py-2 border rounded w-full focus:outline-none focus:ring-2 focus:ring-blue-400"/><br/>
     <div class="flex items-center justify-between">
         <input type="submit" value="Login" id="loginBtn"
             class="bg-black hover:bg-gray-500 text-white font-bold py-2 px-4 rounded cursor-pointer"/>
         <input type="reset" value="Reset"
             class="bg-black hover:bg-gray-600 text-white font-bold py-2 px-4 rounded cursor-pointer"/>
     </div>
    </form>
    <script src="js/login.js"></script>
</body>
</html>
