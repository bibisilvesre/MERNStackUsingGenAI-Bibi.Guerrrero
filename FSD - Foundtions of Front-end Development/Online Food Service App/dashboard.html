<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
        <script src="https://cdn.tailwindcss.com"></script>    
</head> 
<body class="bg-green-900 min-h-screen">

    <nav class="bg-pink-900 shadow px-8 py-4 mb-8">

        <!-- Top Center Title -->
        <div class="text-center mb-4">
            <h1 class="text-4xl font-bold italic text-pink-100">Welcome to Bibi's Food App</h1>
        </div>

        <!-- Bottom Row -->
        <div class="flex justify-between items-center">

            <!-- Left Side (Email + Cart Count) -->
            <div class="flex items-center space-x-4">
                <span id="userEmail" class="bg-pink-200 font-bold text-black px-2 py-2 rounded"></span>
                <span id="cartCount" class="bg-pink-600 font-bold text-white px-2 py-2 rounded"></span>
            </div>

            <!-- Right Side (Buttons) -->
            <div class="flex space-x-2">
                <input type="button" value="Food Menu" onclick="showFoodSelection()"
                       class="bg-pink-700 hover:bg-green-700 text-white font-bold py-2 px-4 rounded cursor-pointer"/>

                <input type="button" value="Cart" onclick="showCartSelection()"
                       class="bg-pink-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded cursor-pointer"/>

                <input type="button" value="Checkout" onclick="checkOut()"
                       class="bg-pink-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded cursor-pointer"/>

                <input type="button" value="Logout" onclick="logout()"
                       class="bg-pink-200 hover:bg-green-800 text-black font-bold py-2 px-4 rounded cursor-pointer"/>
            </div>

        </div>

    </nav>
    <main class="container mx-auto px-4">
        <h2 class="text-2xl font-bold mb-4 text-pink-200">Food Selection:</h2>
        <section id="foodSelection" class="grid grid-cols-1 md:grid-cols-5 gap-6 p-6 bg-green-800 rounded shadow mb-8">
            <!-- Food items will be rendered here -->
        </section>
        <section id="cartSelection" class="bg-green-800 rounded shadow p-6">
            <h2 class="text-xl font-semibold mb-4 text-pink-100">Cart Items:</h2>
            <div id="cartItem">
                <!-- Cart items will be rendered here -->
            </div>        
        </section>
    </main>
    <script src="js/dashboard.js"></script>
</body>
</html>
